{% extends 'default.html' %}
{% load cache %}

{% block content %}
 
{% cache 300 delete %}
<h2>Удалить статью?</h2>

<p>{{ post.title }}</p>

<form method="post">
    {% csrf_token %}

    <button type="submit" class="btn btn-danger">
        Удалить
    </button>
</form>

<a href="{% url 'news_list' %}">Отмена</a>

{% endblock %}
